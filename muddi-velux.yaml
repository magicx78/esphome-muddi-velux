select:
  - platform: template
    name: "Dämmerungsmodus"
    id: twilight_mode
    options: [Civil, Nautical, Astronomical]
    initial_option: Civil
    optimistic: true
    on_value:
      then:
        - text_sensor.template.publish:
            id: light_on_time
            state: !lambda |-
              auto sunset = id(sun_sun).sunset(
                id(twilight_mode).state == "Civil" ? -0.833 :
                id(twilight_mode).state == "Nautical" ? -6.0 : -18.0
              );
              int shift_sunset = id(twilight_mode).state == "Civil" ? 0 :
                                 id(twilight_mode).state == "Nautical" ? -20 : -20;
              if (!sunset.has_value()) return "NaN";
              int sunset_min = sunset.value().hour * 60 + sunset.value().minute + shift_sunset;
              sunset_min = (sunset_min + 1440) % 1440;
              char buffer[8];
              snprintf(buffer, sizeof(buffer), "%02d:%02d", sunset_min/60, sunset_min%60);
              return buffer;
        - text_sensor.template.publish:
            id: light_off_time
            state: !lambda |-
              auto sunrise = id(sun_sun).sunrise(
                id(twilight_mode).state == "Civil" ? -0.833 :
                id(twilight_mode).state == "Nautical" ? -6.0 : -18.0
              );
              int shift_sunrise = id(twilight_mode).state == "Civil" ? 0 :
                                  id(twilight_mode).state == "Nautical" ? 10 : 10;
              if (!sunrise.has_value()) return "NaN";
              int sunrise_min = sunrise.value().hour * 60 + sunrise.value().minute + shift_sunrise;
              sunrise_min = (sunrise_min + 1440) % 1440;
              char buffer[8];
              snprintf(buffer, sizeof(buffer), "%02d:%02d", sunrise_min/60, sunrise_min%60);
              return buffer;

text_sensor:
  - platform: template
    name: "Fahrzeit RUNTER ist um"
    id: light_on_time
    lambda: |-
      float elevation = id(twilight_mode).state == "Civil" ? -0.833 :
                        id(twilight_mode).state == "Nautical" ? -6.0 : -18.0;
      int shift_sunset = id(twilight_mode).state == "Civil" ? 0 :
                         id(twilight_mode).state == "Nautical" ? -20 : -20;
      auto sunset = id(sun_sun).sunset(elevation);
      if (!sunset.has_value()) return std::vector<std::string>{"NaN"};
      int sunset_min = sunset.value().hour * 60 + sunset.value().minute + shift_sunset;
      sunset_min = (sunset_min + 1440) % 1440;
      char buffer[8];
      snprintf(buffer, sizeof(buffer), "%02d:%02d", sunset_min/60, sunset_min%60);
      return std::vector<std::string>{buffer};
    update_interval: 60s

  - platform: template
    name: "Fahrzeit HOCH ist um"
    id: light_off_time
    lambda: |-
      float elevation = id(twilight_mode).state == "Civil" ? -0.833 :
                        id(twilight_mode).state == "Nautical" ? -6.0 : -18.0;
      int shift_sunrise = id(twilight_mode).state == "Civil" ? 0 :
                          id(twilight_mode).state == "Nautical" ? 10 : 10;
      auto sunrise = id(sun_sun).sunrise(elevation);
      if (!sunrise.has_value()) return std::vector<std::string>{"NaN"};
      int sunrise_min = sunrise.value().hour * 60 + sunrise.value().minute + shift_sunrise;
      sunrise_min = (sunrise_min + 1440) % 1440;
      char buffer[8];
      snprintf(buffer, sizeof(buffer), "%02d:%02d", sunrise_min/60, sunrise_min%60);
      return std::vector<std::string>{buffer};
    update_interval: 60s

