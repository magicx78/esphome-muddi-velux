esphome:
  name: muddi-velux
  on_boot:
    - priority: 800
      then:
        - output.turn_off: pwm_mod1
        - output.turn_off: pwm_mod2
        - output.turn_off: pwm_mod3
        - output.turn_off: pwm_mod4
        - output.turn_off: pwm_mod5
        - output.turn_off: pwm_mod6
    - priority: 600
      then:
        - logger.log:
            format: "Boot: Jalousie-Controller gestartet, Automatik = %s"
            args: [ to_string(id(jalousie_automatik).state).c_str() ]
    - priority: -100
      then:
        - text_sensor.template.publish: { id: api_status_text,  state: "OK" }
        - text_sensor.template.publish: { id: time_status_text, state: "OK" }
 #   - priority: -10
 #     then:
 #       - script.execute: auto_enable_if_unlocked

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

ota:
  - platform: esphome
    password: "4e91f61a16c653543643442a86e58dff"

wifi:
