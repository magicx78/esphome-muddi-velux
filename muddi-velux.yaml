    icon: "mdi:blinds"
    on_press:
      - if:
          condition: { lambda: 'return id(needs_calibration_1);' }
          then: [logger.log: "${window_1_name}: gesperrt – zuerst kalibrieren."]
          else:
            - cover.control: { id: jalousie1_hw, position: 0.50 }
