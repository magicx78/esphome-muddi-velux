switch:

  - platform: template
    name: "Jalousie Automatik"
    id: jalousie_automatik
    optimistic: true

    turn_on_action:
      - logger.log:
          format: "Automatik aktiviert (Modus = %s)"
          args: [ id(twilight_mode).state.c_str() ]

      - lambda: |-
          using esphome::cover::Cover;

          auto now = id(sntp_time).now();
          if (!now.is_valid()) { ESP_LOGW("jalousie","Zeitquelle ungültig – blockiere."); return; }
          const int hour = now.hour;                // 0..23
          const bool allow_open  = hour >= 6;       // Öffnen nur ab 06:00
          const bool allow_close = (hour >= 17) || (hour < 6);  // Schließen 17:00–24:00 und 00:00–06:00

          auto open_safe = [&](Cover *cv) {
            if (allow_open) cv->make_call().set_command_open().perform();
            else ESP_LOGI("jalousie", "Öffnen vor 06:00 blockiert.");
          };
          auto close_safe = [&](Cover *cv) {
            if (allow_close) cv->make_call().set_command_close().perform();
            else ESP_LOGI("jalousie", "Schließen zwischen 06:00–17:00 blockiert.");
          };
          auto position_safe = [&](Cover *cv, float p) {
            // >0.5 = öffnen, <=0.5 = schließen  (0.50 nun „schließen“!)
            if (p > 0.5f) {
              if (allow_open) cv->make_call().set_position(p).perform();
              else ESP_LOGI("jalousie", "Position %.0f%% vor 06:00 blockiert.", p*100);
            } else {
              if (allow_close) cv->make_call().set_position(p).perform();
              else ESP_LOGI("jalousie", "Position %.0f%% zwischen 06:00–17:00 blockiert.", p*100);
            }
          };

          double elev = id(sun_sun).elevation();
          auto mode = id(twilight_mode).state;

          auto apply = [&](Cover *cv) {
            if (mode == "astronomisch") {
              if (elev > -18.0) position_safe(cv, 0.10f); else close_safe(cv);
            } else if (mode == "nautisch") {
              if (elev > -12.0) position_safe(cv, 0.50f); else position_safe(cv, 0.10f);
            } else if (mode == "bürgerlich") {
              if (elev > -6.0) open_safe(cv); else position_safe(cv, 0.50f);
            }
          };

          apply(id(cover_1)); apply(id(cover_2)); apply(id(cover_3)); apply(id(cover_4));
          apply(id(cover_5)); apply(id(cover_6));


