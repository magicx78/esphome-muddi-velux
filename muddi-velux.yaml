    key: "50W+iCzJ2PitfU/6aY1L+7c35rVKHL/WG62NFSTg2lo="
  reboot_timeout: 0s
  on_client_connected:
    then:
      - if:
          condition:
            lambda: |-
              const bool safe_end = (id(last_state_1) == 1 || id(last_state_1) == 2);
              return !(safe_end && !id(in_motion_1)) && !id(notify_sent_1);
          then:
            - homeassistant.service:
                service: ${notify_target}
                data: { title: "Jalousie-Steuerung", message: "Fenster 1: Kalibrierung erforderlich – letzter Zustand unsicher." }
            - homeassistant.service:
                service: persistent_notification.create
                data: { title: "Jalousie-Steuerung", message: "Fenster 1: Kalibrierung nötig (Neustart während Fahrt oder Endlage unbekannt)." }
            - lambda: |-
                id(needs_calibration_1) = true;
                id(notify_sent_1) = true;
          else:
