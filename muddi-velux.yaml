  password: !secret wifi_password

i2c:
  - id: bus_a
    sda: 3
    scl: 2
    scan: true
    frequency: 400kHz

pcf8574:
  - id: 'pcf8574_hub_in_1'
    i2c_id: bus_a
    address: 0x24
    pcf8575: true

interval:
  - interval: 10s
    then:
      - if:
          condition: api.connected
          then:
            - text_sensor.template.publish: { id: api_status_text, state: "OK" }
          else:
            - text_sensor.template.publish: { id: api_status_text, state: "Fehler Verbindung (API offline)" }
      - lambda: |-
          auto t = id(sntp_time).now();
          id(time_status_text).publish_state(t.is_valid() ? "OK" : "Fehler Zeit (SNTP ungültig)");
  - interval: 24h
    then:
      - text_sensor.template.publish: { id: api_status_text, state: "OK" }
      - text_sensor.template.publish: { id: time_status_text, state: "OK" }

logger:
  level: DEBUG

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    on_time_sync:
      - logger.log: "Time synchronized with NTP"

