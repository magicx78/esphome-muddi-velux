# bürgerlich (Sunset) -> 0.50
# nautisch (Sunset)   -> 0.10
# astronomisch        -> close
# ... jeweils analog mit set_position() oder set_command_close()
sun:
  latitude: ${latitude}
  longitude: ${longitude}
  id: sun_sun

  on_sunrise:
    - elevation: -18.0
      then:
        - logger.log:
            format: "Sunrise: astronomisch (–18°) erreicht"
        - lambda: |-
            if (!id(jalousie_automatik).state) return;
            if (id(twilight_mode).state != "astronomisch") return;
            esphome::cover::Cover* covers[] = { id(cover_1), id(cover_2), id(cover_3), id(cover_4), id(cover_5), id(cover_6) };
            for (auto *c : covers) { auto call = c->make_call(); call.set_position(0.10f); call.perform(); }

    - elevation: -12.0
      then:
        - logger.log:
            format: "Sunrise: nautisch (–12°) erreicht"
        - lambda: |-
            if (!id(jalousie_automatik).state) return;
            if (id(twilight_mode).state != "nautisch") return;
            esphome::cover::Cover* covers[] = { id(cover_1), id(cover_2), id(cover_3), id(cover_4), id(cover_5), id(cover_6) };
            for (auto *c : covers) { auto call = c->make_call(); call.set_position(0.50f); call.perform(); }

    - elevation: -6.0
      then:
        - logger.log:
            format: "Sunrise: bürgerlich (–6°) erreicht"
        - lambda: |-
            if (!id(jalousie_automatik).state) return;
            if (id(twilight_mode).state != "bürgerlich") return;
            esphome::cover::Cover* covers[] = { id(cover_1), id(cover_2), id(cover_3), id(cover_4), id(cover_5), id(cover_6) };
            for (auto *c : covers) { auto call = c->make_call(); call.set_command_open(); call.perform(); }

  on_sunset:
    - elevation: -6.0
      then:
        - logger.log:
            format: "Sunset: bürgerlich (–6°) erreicht"
        - lambda: |-
            if (!id(jalousie_automatik).state) return;
            if (id(twilight_mode).state != "bürgerlich") return;
            esphome::cover::Cover* covers[] = { id(cover_1), id(cover_2), id(cover_3), id(cover_4), id(cover_5), id(cover_6) };
            for (auto *c : covers) { auto call = c->make_call(); call.set_position(0.50f); call.perform(); }

    - elevation: -12.0
      then:
        - logger.log:
            format: "Sunset: nautisch (–12°) erreicht"
        - lambda: |-
            if (!id(jalousie_automatik).state) return;
            if (id(twilight_mode).state != "nautisch") return;
            esphome::cover::Cover* covers[] = { id(cover_1), id(cover_2), id(cover_3), id(cover_4), id(cover_5), id(cover_6) };
            for (auto *c : covers) { auto call = c->make_call(); call.set_position(0.10f); call.perform(); }

    - elevation: -18.0
      then:
        - logger.log:
            format: "Sunset: astronomisch (–18°) erreicht"
        - lambda: |-
            if (!id(jalousie_automatik).state) return;
            if (id(twilight_mode).state != "astronomisch") return;
            esphome::cover::Cover* covers[] = { id(cover_1), id(cover_2), id(cover_3), id(cover_4), id(cover_5), id(cover_6) };
            for (auto *c : covers) { auto call = c->make_call(); call.set_command_close(); call.perform(); }



