select:
  - platform: template
    name: "Dämmerungsmodus"
    id: twilight_mode
    options:
      - Civil
      - Nautical
      - Astronomical
    initial_option: Civil
    optimistic: true
    on_value:
      then:
        - text_sensor.template.publish:
            id: window_open_time
            state: !lambda |-
              auto sunset = id(sun_sun).sunset(
                id(twilight_mode).state == "Civil" ? -0.833 :
                id(twilight_mode).state == "Nautical" ? -6.0 : -18.0
              );
              int shift_sunset = id(twilight_mode).state == "Civil" ? -0 :
                                 id(twilight_mode).state == "Nautical" ? -20 : -20;
              if (!sunset.has_value()) {
                ESP_LOGW("sun_shift", "Sunset calculation failed (%s)", id(twilight_mode).state.c_str());
                return "NaN";
              }
              int sunset_min = sunset.value().hour * 60 + sunset.value().minute + shift_sunset;
              sunset_min = (sunset_min + 1440) % 1440; // Normalize time
              int sunset_hour = sunset_min / 60;
              int sunset_minute = sunset_min % 60;
              ESP_LOGD("sun_shift", "Sunset (%s): %02d:%02d, Shifted: %02d:%02d",
                       id(twilight_mode).state.c_str(), sunset.value().hour, sunset.value().minute, sunset_hour, sunset_minute);
              char buffer[8];
              snprintf(buffer, sizeof(buffer), "%02d:%02d", sunset_hour, sunset_minute);
              return buffer;
        - text_sensor.template.publish:
            id: window_close_time
            state: !lambda |-
              auto sunrise = id(sun_sun).sunrise(
                id(twilight_mode).state == "Civil" ? -0.833 :
                id(twilight_mode).state == "Nautical" ? -6.0 : -18.0
              );
              int shift_sunrise = id(twilight_mode).state == "Civil" ? 0 :
                                  id(twilight_mode).state == "Nautical" ? 10 : 10;
              if (!sunrise.has_value()) {
                ESP_LOGW("sun_shift", "Sunrise calculation failed (%s)", id(twilight_mode).state.c_str());
                return "NaN";
              }
              int sunrise_min = sunrise.value().hour * 60 + sunrise.value().minute + shift_sunrise;
              sunrise_min = (sunrise_min + 1440) % 1440; // Normalize time
              int sunrise_hour = sunrise_min / 60;
              int sunrise_minute = sunrise_min % 60;
              ESP_LOGD("sun_shift", "Sunrise (%s): %02d:%02d, Shifted: %02d:%02d",
                       id(twilight_mode).state.c_str(), sunrise.value().hour, sunrise.value().minute, sunrise_hour, sunrise_minute);
              char buffer[8];
              snprintf(buffer, sizeof(buffer), "%02d:%02d", sunrise_hour, sunrise_minute);
              return buffer;

text_sensor:
  - platform: template
    name: "Fahrzeit RUNTER ist um"
    id: window_close_time
    lambda: |-
      float elevation = id(twilight_mode).state == "Civil" ? -0.833 :
      id(twilight_mode).state == "Nautical" ? -6.0 : -18.0;
      int shift_sunset = id(twilight_mode).state == "Civil" ? -0 :
      id(twilight_mode).state == "Nautical" ? -20 : -20;
      auto sunset = id(sun_sun).sunset(elevation);
      if (!sunset.has_value()) {
        ESP_LOGW("sun_shift", "Sunset calculation failed (%s)", id(twilight_mode).state.c_str());
        return {"NaN"};
      }
      int sunset_min = sunset.value().hour * 60 + sunset.value().minute + shift_sunset;
      sunset_min = (sunset_min + 1440) % 1440; // Normalize time
      int sunset_hour = sunset_min / 60;
      int sunset_minute = sunset_min % 60;
      ESP_LOGD("sun_shift", "Sunset (%s): %02d:%02d, Shifted: %02d:%02d",
      id(twilight_mode).state.c_str(), sunset.value().hour, sunset.value().minute, sunset_hour, sunset_minute);
      char buffer[8];
      snprintf(buffer, sizeof(buffer), "%02d:%02d", sunset_hour, sunset_minute);
